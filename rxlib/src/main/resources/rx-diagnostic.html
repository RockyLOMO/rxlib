<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>${title}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f2ea;
            --ink: #17211b;
            --muted: #617066;
            --card: #fffaf0;
            --line: #dfd3bf;
            --accent: #126c5a;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #f6f2ea, #e9f3ee);
            color: var(--ink);
            font-family: Georgia, "Times New Roman", serif;
        }

        main {
            max-width: 1180px;
            margin: 0 auto;
            padding: 22px;
        }

        h1 {
            font-size: 34px;
            margin: 0 0 8px;
        }

        h2 {
            font-size: 21px;
            margin: 0 0 14px;
        }

        .hero {
            display: flex;
            gap: 16px;
            justify-content: space-between;
            align-items: flex-end;
            margin: 8px 0 18px;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
        }

        .pill {
            background: var(--accent);
            color: white;
            border-radius: 999px;
            padding: 10px 14px;
            word-break: break-all;
        }

        .card {
            background: rgba(255, 250, 240, .92);
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: 0 14px 36px rgba(45, 32, 10, .08);
            margin: 14px 0;
            padding: 16px;
            overflow: hidden;
        }

        .warn {
            border-color: #c57b57;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 12px;
        }

        .item {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 12px;
            background: #fffdf7;
        }

        .item strong {
            display: block;
            font-size: 16px;
        }

        .item span,
        .meta {
            color: var(--muted);
            font-size: 12px;
        }

        .path {
            font-size: 12px;
            word-break: break-all;
            color: var(--muted);
        }

        .summary {
            white-space: normal;
            line-height: 1.5;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            align-items: end;
            margin: 0 0 14px;
        }

        .filters label {
            color: var(--muted);
            font-size: 12px;
        }

        .filters input {
            box-sizing: border-box;
            width: 100%;
            margin-top: 5px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fffdf7;
            color: var(--ink);
            padding: 9px 10px;
            font: inherit;
        }

        button,
        .button {
            border: 0;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            display: inline-block;
            font: inherit;
            font-weight: 700;
            padding: 10px 14px;
            text-align: center;
            text-decoration: none;
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
            margin: 0 0 14px;
        }

        .chart {
            background: #fffdf7;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 12px;
        }

        .chart-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .metric-chart {
            height: 130px;
            margin: 8px 0;
            width: 100%;
        }

        .axis {
            stroke: #d7c9b2;
            stroke-width: 2;
        }

        .series {
            fill: none;
            stroke: var(--accent);
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-width: 3;
            vector-effect: non-scaling-stroke;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th,
        td {
            border-bottom: 1px solid var(--line);
            padding: 9px 8px;
            text-align: left;
            vertical-align: top;
        }

        th {
            color: var(--muted);
            font-weight: 600;
        }

        td {
            word-break: break-word;
        }

        a {
            color: var(--accent);
            font-weight: 700;
        }

        pre {
            white-space: pre-wrap;
            background: #17211b;
            color: #f7f1e6;
            padding: 14px;
            border-radius: 14px;
            overflow: auto;
        }

        .empty {
            color: var(--muted);
        }

        @media (max-width: 720px) {
            main {
                padding: 12px;
            }

            .hero {
                display: block;
            }

            .pill {
                margin-top: 12px;
                display: inline-block;
            }

            table,
            thead,
            tbody,
            tr,
            th,
            td {
                display: block;
            }

            thead {
                display: none;
            }

            tr {
                border: 1px solid var(--line);
                border-radius: 14px;
                margin: 10px 0;
                background: #fffdf7;
            }

            td {
                border: 0;
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
<main>${body}</main>
</body>
</html>
