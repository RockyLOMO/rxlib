<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{title}}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f2ea;
            --ink: #17211b;
            --muted: #617066;
            --card: #fffaf0;
            --line: #dfd3bf;
            --accent: #126c5a;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #f6f2ea, #e9f3ee);
            color: var(--ink);
            font-family: Georgia, "Times New Roman", serif;
        }

        main {
            max-width: 1180px;
            margin: 0 auto;
            padding: 22px;
        }

        h1 {
            font-size: 34px;
            margin: 0 0 8px;
        }

        h2 {
            font-size: 21px;
            margin: 0 0 14px;
        }

        .chart-group-title {
            color: var(--muted);
            font-size: 15px;
            letter-spacing: .04em;
            margin: 16px 0 10px;
            text-transform: uppercase;
        }

        .metric-group-title {
            color: var(--accent);
            font-size: 14px;
            letter-spacing: .03em;
            margin: 14px 0 8px;
        }

        .hero {
            display: flex;
            gap: 16px;
            justify-content: space-between;
            align-items: flex-end;
            margin: 8px 0 18px;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
        }

        .pill {
            background: var(--accent);
            color: white;
            border-radius: 999px;
            padding: 10px 14px;
            word-break: break-all;
        }

        .card {
            background: rgba(255, 250, 240, .92);
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: 0 14px 36px rgba(45, 32, 10, .08);
            margin: 14px 0;
            padding: 16px;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 0 0 14px;
            position: sticky;
            top: 0;
            z-index: 2;
            padding: 8px 0;
            background: linear-gradient(135deg, #f6f2ea, #e9f3ee);
            box-shadow: 0 8px 16px rgba(45, 32, 10, .06);
        }

        .tab-link {
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #fffdf7;
            color: var(--muted);
            padding: 9px 13px;
            text-decoration: none;
        }

        .tab-link.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .warn {
            border-color: #c57b57;
        }

        .notice {
            border-color: var(--accent);
            background: rgba(232, 244, 238, .92);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 12px;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: minmax(240px, .8fr) minmax(320px, 1.2fr);
            gap: 12px;
        }

        .item {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 12px;
            background: #fffdf7;
        }

        .danger {
            border-color: #c57b57;
            background: #fff8f2;
        }

        .item strong {
            display: block;
            font-size: 16px;
        }

        .item span,
        .meta {
            color: var(--muted);
            font-size: 12px;
        }

        .path {
            font-size: 12px;
            word-break: break-all;
            color: var(--muted);
        }

        .summary {
            white-space: normal;
            line-height: 1.5;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            align-items: end;
            margin: 0 0 14px;
        }

        .filters label {
            color: var(--muted);
            font-size: 12px;
        }

        .filters input,
        .filters select,
        .filters textarea {
            box-sizing: border-box;
            width: 100%;
            margin-top: 5px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fffdf7;
            color: var(--ink);
            padding: 9px 10px;
            font: inherit;
        }

        .filters textarea {
            min-height: 86px;
            resize: vertical;
        }

        .filters .wide {
            grid-column: 1 / -1;
        }

        .inline-form {
            align-items: center;
            display: flex;
            gap: 8px;
        }

        .inline-form input {
            min-width: 160px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fffdf7;
            color: var(--ink);
            padding: 8px 9px;
            font: inherit;
        }

        .context-filter {
            display: none;
            grid-column: 1 / -1;
            margin: 0;
        }

        .context-filter.active {
            display: grid;
        }

        .thresholds {
            margin: 12px 0 18px;
        }

        .thresholds summary {
            cursor: pointer;
            font-weight: 700;
            margin-bottom: 10px;
        }

        button,
        .button {
            border: 0;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            display: inline-block;
            font: inherit;
            font-weight: 700;
            padding: 10px 14px;
            text-align: center;
            text-decoration: none;
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
            margin: 0 0 14px;
        }

        .chart {
            background: #fffdf7;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 12px;
        }

        .chart-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .metric-chart {
            height: 130px;
            margin: 8px 0;
            width: 100%;
        }

        .axis {
            stroke: #d7c9b2;
            stroke-width: 2;
        }

        .grid-line {
            stroke: #e5dccd;
            stroke-width: 1;
        }

        .y-label {
            fill: var(--muted);
            font-size: 11px;
            font-family: Georgia, "Times New Roman", serif;
        }

        .series {
            fill: none;
            stroke: var(--accent);
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-width: 3;
            vector-effect: non-scaling-stroke;
        }

        .point {
            fill: #fffdf7;
            stroke: var(--accent);
            stroke-width: 2;
            vector-effect: non-scaling-stroke;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th,
        td {
            border-bottom: 1px solid var(--line);
            padding: 9px 8px;
            text-align: left;
            vertical-align: top;
        }

        th {
            color: var(--muted);
            font-weight: 600;
        }

        td {
            word-break: break-word;
        }

        a {
            color: var(--accent);
            font-weight: 700;
        }

        pre {
            white-space: pre-wrap;
            background: #17211b;
            color: #f7f1e6;
            padding: 14px;
            border-radius: 14px;
            overflow: auto;
        }

        .tool-output {
            max-height: 420px;
        }

        .tool-history {
            margin: -4px 0 12px;
        }

        .tool-history-title {
            color: var(--muted);
            font-size: 12px;
            margin: 0 0 6px;
        }

        .tool-history-items {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tool-history-item {
            background: #fffdf7;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--muted);
            cursor: pointer;
            font: inherit;
            font-size: 12px;
            max-width: 100%;
            overflow: hidden;
            padding: 6px 9px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tool-history-clear {
            background: transparent;
            border: 1px solid var(--line);
            color: var(--muted);
            padding: 6px 9px;
        }

        .empty {
            color: var(--muted);
        }

        @media (max-width: 720px) {
            main {
                padding: 12px;
            }

            .hero {
                display: block;
            }

            .tool-grid {
                display: block;
            }

            .pill {
                margin-top: 12px;
                display: inline-block;
            }

            table,
            thead,
            tbody,
            tr,
            th,
            td {
                display: block;
            }

            thead {
                display: none;
            }

            tr {
                border: 1px solid var(--line);
                border-radius: 14px;
                margin: 10px 0;
                background: #fffdf7;
            }

            td {
                border: 0;
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
<main>{{{body}}}</main>
<script>
    (function () {
        var links = document.querySelectorAll('.tab-link');
        var panels = document.querySelectorAll('.tab-panel');
        var contextFilters = document.querySelectorAll('.context-filter');
        var stayTabForms = document.querySelectorAll('form[data-stay-tab]');

        function activate(id) {
            if (document.activeElement && document.activeElement.blur) {
                document.activeElement.blur();
            }
            if (!id || !document.getElementById(id)) {
                id = 'overview';
            }
            for (var i = 0; i < panels.length; i++) {
                panels[i].classList.toggle('active', panels[i].id === id);
            }
            for (var j = 0; j < links.length; j++) {
                links[j].classList.toggle('active', links[j].getAttribute('data-tab') === id);
            }
            for (var c = 0; c < contextFilters.length; c++) {
                contextFilters[c].classList.toggle('active', contextFilters[c].getAttribute('data-context-tab') === id);
            }
            for (var f = 0; f < stayTabForms.length; f++) {
                stayTabForms[f].setAttribute('action', '#' + id);
            }
        }

        for (var k = 0; k < links.length; k++) {
            links[k].addEventListener('click', function () {
                activate(this.getAttribute('data-tab'));
            });
        }
        window.addEventListener('hashchange', function () {
            activate(location.hash ? location.hash.substring(1) : null);
        });
        activate(location.hash ? location.hash.substring(1) : null);
    })();
    (function () {
        var maxHistory = 10;
        var storageKey = 'rx.diagnostic.tools.history.v1';
        var forms = document.querySelectorAll('form[data-tool-history]');
        var lists = document.querySelectorAll('[data-tool-history-list]');

        function loadHistory() {
            try {
                return JSON.parse(localStorage.getItem(storageKey) || '{}') || {};
            } catch (e) {
                return {};
            }
        }

        function saveHistory(history) {
            try {
                localStorage.setItem(storageKey, JSON.stringify(history));
            } catch (e) {
            }
        }

        function fields(form) {
            return form.querySelectorAll('input[name], textarea[name], select[name]');
        }

        function collect(form) {
            var values = {};
            var controls = fields(form);
            for (var i = 0; i < controls.length; i++) {
                var control = controls[i];
                if (control.type === 'hidden' || control.name === 'action') {
                    continue;
                }
                values[control.name] = control.value || '';
            }
            return values;
        }

        function isEmpty(values) {
            for (var key in values) {
                if (Object.prototype.hasOwnProperty.call(values, key) && values[key]) {
                    return false;
                }
            }
            return true;
        }

        function same(a, b) {
            return JSON.stringify(a) === JSON.stringify(b);
        }

        function label(values) {
            var parts = [];
            for (var key in values) {
                if (Object.prototype.hasOwnProperty.call(values, key) && values[key]) {
                    parts.push(key + '=' + values[key].replace(/\s+/g, ' '));
                }
            }
            if (!parts.length) {
                return 'empty';
            }
            return parts.join(' | ').substring(0, 160);
        }

        function applyValues(form, values) {
            var controls = fields(form);
            for (var i = 0; i < controls.length; i++) {
                var control = controls[i];
                if (Object.prototype.hasOwnProperty.call(values, control.name)) {
                    control.value = values[control.name];
                }
            }
        }

        function formByKind(kind) {
            return document.querySelector('form[data-tool-history="' + kind + '"]');
        }

        function renderHistory() {
            var history = loadHistory();
            for (var i = 0; i < lists.length; i++) {
                var list = lists[i];
                var kind = list.getAttribute('data-tool-history-list');
                var rows = history[kind] || [];
                list.innerHTML = '';
                if (!rows.length) {
                    continue;
                }
                var title = document.createElement('div');
                title.className = 'tool-history-title';
                title.appendChild(document.createTextNode('Recent inputs'));
                list.appendChild(title);
                var items = document.createElement('div');
                items.className = 'tool-history-items';
                for (var j = 0; j < rows.length; j++) {
                    var row = rows[j];
                    var button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'tool-history-item';
                    button.setAttribute('data-tool-history-kind', kind);
                    button.setAttribute('data-tool-history-index', String(j));
                    button.title = label(row);
                    button.appendChild(document.createTextNode(label(row)));
                    items.appendChild(button);
                }
                var clear = document.createElement('button');
                clear.type = 'button';
                clear.className = 'tool-history-item tool-history-clear';
                clear.setAttribute('data-tool-history-clear', kind);
                clear.appendChild(document.createTextNode('Clear'));
                items.appendChild(clear);
                list.appendChild(items);
            }
        }

        for (var i = 0; i < forms.length; i++) {
            forms[i].addEventListener('submit', function () {
                var kind = this.getAttribute('data-tool-history');
                var values = collect(this);
                if (isEmpty(values)) {
                    return;
                }
                var history = loadHistory();
                var rows = history[kind] || [];
                var next = [values];
                for (var j = 0; j < rows.length && next.length < maxHistory; j++) {
                    if (!same(values, rows[j])) {
                        next.push(rows[j]);
                    }
                }
                history[kind] = next;
                saveHistory(history);
            });
        }

        document.addEventListener('click', function (event) {
            var target = event.target;
            if (!target || !target.getAttribute) {
                return;
            }
            var clearKind = target.getAttribute('data-tool-history-clear');
            if (clearKind) {
                var clearHistory = loadHistory();
                clearHistory[clearKind] = [];
                saveHistory(clearHistory);
                renderHistory();
                return;
            }
            var kind = target.getAttribute('data-tool-history-kind');
            var index = target.getAttribute('data-tool-history-index');
            if (!kind || index === null) {
                return;
            }
            var history = loadHistory();
            var row = (history[kind] || [])[parseInt(index, 10)];
            var form = formByKind(kind);
            if (row && form) {
                applyValues(form, row);
            }
        });

        renderHistory();
    })();
</script>
</body>
</html>
