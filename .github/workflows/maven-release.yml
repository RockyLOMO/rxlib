name: Publish Release to Maven Central

on:
  workflow_dispatch:    # 手动触发
    inputs:
      version:
        description: 'Release version (e.g., 2.21.11, leave empty to auto-detect from pom.xml)'
        required: false
        default: ''
      create_tag:
        description: 'Create Git tag + GitHub Release on the release commit (after Central deploy)'
        required: false
        default: 'true'
        type: boolean

jobs:
  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push commits/tags、创建 GitHub Release
    environment: release

    env:
      RELEASE_BRANCH: ${{ github.ref_name }}
      VERSIONS_PLUGIN: org.codehaus.mojo:versions-maven-plugin:2.17.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
          server-id: ossrh
          server-username: OSSRH_USERNAME
          server-password: OSSRH_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Parse current version
        id: parse_version
        run: |
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "current_version=$CURRENT_VERSION"
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [[ -n "$INPUT_VERSION" ]]; then
            RELEASE_VERSION="$INPUT_VERSION"
            echo "Using provided version: $RELEASE_VERSION"
          else
            if [[ "$CURRENT_VERSION" == *-SNAPSHOT ]]; then
              RELEASE_VERSION="${CURRENT_VERSION%-SNAPSHOT}"
              echo "Auto-detected version: $RELEASE_VERSION"
            else
              echo "❌ 当前版本不是 SNAPSHOT 版本: $CURRENT_VERSION"
              echo "请确保版本号格式为 x.y.z-SNAPSHOT，或提供版本号参数"
              exit 1
            fi
          fi

          echo "release_version=$RELEASE_VERSION"
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT

          IFS='.' read -ra VERSION_PARTS <<< "$RELEASE_VERSION"
          if [[ ${#VERSION_PARTS[@]} -lt 3 ]]; then
            echo "❌ 发布版本应为至少三段式 x.y.z，当前: $RELEASE_VERSION"
            exit 1
          fi
          PATCH_VERSION=$((VERSION_PARTS[2] + 1))
          NEXT_SNAPSHOT="${VERSION_PARTS[0]}.${VERSION_PARTS[1]}.$PATCH_VERSION-SNAPSHOT"
          echo "next_snapshot=$NEXT_SNAPSHOT"
          echo "next_snapshot=$NEXT_SNAPSHOT" >> $GITHUB_OUTPUT

      - name: Set Maven version (release)
        run: |
          RELEASE_VERSION="${{ steps.parse_version.outputs.release_version }}"
          echo "versions:set -> $RELEASE_VERSION"
          mvn -B -q "${{ env.VERSIONS_PLUGIN }}:set" \
            -DnewVersion="$RELEASE_VERSION" \
            -DgenerateBackupPoms=false \
            -DprocessAllModules=true

      - name: Commit and push release POMs
        id: release_commit
        run: |
          RELEASE_VERSION="${{ steps.parse_version.outputs.release_version }}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add pom.xml rxlib/pom.xml rxlib-x/pom.xml
          git pull origin "${RELEASE_BRANCH}" --rebase || true

          git commit -m "chore: release v$RELEASE_VERSION [skip ci]"
          git push origin "HEAD:${RELEASE_BRANCH}"

          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "发布版本 POM 已推送到分支 ${RELEASE_BRANCH}，commit=$(git rev-parse HEAD)"

      - name: Deploy Release to Maven Central (with GPG Sign)
        id: deploy_central
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          # maven-gpg-plugin 3.x：用环境变量，勿传 -Dgpg.passphrase（会告警且易泄露）
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          RELEASE_VERSION="${{ steps.parse_version.outputs.release_version }}"
          echo "开始发布版本: $RELEASE_VERSION"

          mvn clean deploy \
            -pl rxlib,rxlib-x -am \
            -DskipTests \
            -Dgpg.skip=false \
            --no-transfer-progress \
            --batch-mode

      # SNAPSHOT 回滚紧接在 Central 成功之后，避免后续 GitHub Release 失败时仓库仍停留在非 SNAPSHOT
      - name: Set Maven version (next SNAPSHOT)
        if: steps.deploy_central.outcome == 'success'
        run: |
          NEXT_SNAPSHOT="${{ steps.parse_version.outputs.next_snapshot }}"
          echo "versions:set -> $NEXT_SNAPSHOT"
          mvn -B -q "${{ env.VERSIONS_PLUGIN }}:set" \
            -DnewVersion="$NEXT_SNAPSHOT" \
            -DgenerateBackupPoms=false \
            -DprocessAllModules=true

      - name: Commit and push next development version
        if: steps.deploy_central.outcome == 'success'
        run: |
          NEXT_SNAPSHOT="${{ steps.parse_version.outputs.next_snapshot }}"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add pom.xml rxlib/pom.xml rxlib-x/pom.xml
          git pull origin "${RELEASE_BRANCH}" --rebase || true

          git commit -m "chore: prepare v$NEXT_SNAPSHOT [skip ci]"
          git push origin "HEAD:${RELEASE_BRANCH}"

          echo "下一个开发版本已提交并推送"

      - name: Create Release Notes
        if: steps.deploy_central.outcome == 'success' && github.event.inputs.create_tag == 'true'
        run: |
          RELEASE_VERSION="${{ steps.parse_version.outputs.release_version }}"
          echo "# Release $RELEASE_VERSION" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "✅ Successfully published to Maven Central" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "Artifacts:" >> RELEASE_NOTES.md
          echo "- rxlib: $RELEASE_VERSION" >> RELEASE_NOTES.md
          echo "- rxlib-x: $RELEASE_VERSION" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "Dependency:" >> RELEASE_NOTES.md
          echo "\`\`\`xml" >> RELEASE_NOTES.md
          echo "<dependency>" >> RELEASE_NOTES.md
          echo "    <groupId>com.github.rockylomo</groupId>" >> RELEASE_NOTES.md
          echo "    <artifactId>rxlib</artifactId>" >> RELEASE_NOTES.md
          echo "    <version>$RELEASE_VERSION</version>" >> RELEASE_NOTES.md
          echo "</dependency>" >> RELEASE_NOTES.md
          echo "\`\`\`" >> RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        id: github_release
        if: steps.deploy_central.outcome == 'success' && github.event.inputs.create_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.parse_version.outputs.release_version }}
          name: Release ${{ steps.parse_version.outputs.release_version }}
          body_path: RELEASE_NOTES.md
          target_commitish: ${{ steps.release_commit.outputs.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success Notification
        if: always() && steps.deploy_central.outcome == 'success'
        env:
          GITHUB_RELEASE_OUTCOME: ${{ steps.github_release.outcome }}
        run: |
          RELEASE_VERSION="${{ steps.parse_version.outputs.release_version }}"
          NEXT_SNAPSHOT="${{ steps.parse_version.outputs.next_snapshot }}"
          CREATE_TAG="${{ github.event.inputs.create_tag }}"
          echo "✅ 正式版本 $RELEASE_VERSION 已成功发布到 Maven Central（已签名）"
          echo "📦 构件:"
          echo "   - rxlib: $RELEASE_VERSION"
          echo "   - rxlib-x: $RELEASE_VERSION"
          echo "🔄 下一个开发版本: $NEXT_SNAPSHOT"
          echo "🌿 目标分支: ${RELEASE_BRANCH}"
          echo "🏷️  GitHub Release/标签: $( [ "$CREATE_TAG" = "true" ] && echo "是 (v$RELEASE_VERSION)" || echo "否（仅 Central + POM 提交）" )"
          echo "🔐 GPG签名: 已启用"
          if [[ "$GITHUB_RELEASE_OUTCOME" == "failure" ]]; then
            echo "⚠️  GitHub Release 步骤失败；Central 与 SNAPSHOT 回滚若已执行请核对仓库与远端。"
          fi

      - name: Failure Notification
        # Central 已成功时不打印本失败块（避免与 Success Notification 重复）
        if: always() && failure() && steps.deploy_central.outcome != 'success'
        run: |
          echo "❌ 发布失败，请检查:"
          echo "   1. 当前版本号格式是否为 x.y.z-SNAPSHOT（或手动输入合法 x.y.z）"
          echo "   2. Secrets 是否配置正确（OSSRH_USERNAME, OSSRH_TOKEN, GPG_PRIVATE_KEY, GPG_PASSPHRASE）"
          echo "   3. 是否有编译或依赖错误"
          echo "   4. 分支 ${RELEASE_BRANCH} 的推送权限、分支保护规则是否允许 github-actions 推送"
          echo "   5. deploy 之前的步骤（版本写入、commit、push）是否成功"
          exit 1
