name: Build & Push to ssh - rssGateway
# copy logback
on:
  workflow_dispatch:    # 支持手动触发
    inputs:
      deploy_mode:
        description: 发布策略：replace 替换旧进程，coexist 新老并存
        required: true
        default: replace
        type: choice
        options:
          - replace
          - coexist
      reuseport_migration_fallback:
        description: replace 并行切换失败时，允许首次迁移兼容重启
        required: true
        default: true
        type: boolean
#  push:
#    branches: [ rss-21 ]

jobs:
  build-and-push:
#    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'pub rss-gateway')
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: rss-21
      - name: 显示当前分支
        run: git branch --show-current

      # 2. 设置 JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'   # Eclipse Temurin (推荐) 或 'zulu'
          cache: maven              # 如果是 Maven 项目自动缓存依赖

      # 3. 编译并打包（根据实际项目选择其一）
      - name: Set environment variables
        run: |
          echo "APP_MODULE=rxlib" >> $GITHUB_ENV
          echo "REMOTE_DIR=rss" >> $GITHUB_ENV
          echo "HEALTH_URL=cloud.f-li.cn:6899" >> $GITHUB_ENV
          echo "DEPLOY_MODE=${{ inputs.deploy_mode || 'replace' }}" >> $GITHUB_ENV
          if [[ "${{ inputs.reuseport_migration_fallback }}" == "true" ]]; then
            echo "REUSEPORT_MIGRATION_FALLBACK=1" >> $GITHUB_ENV
          else
            echo "REUSEPORT_MIGRATION_FALLBACK=0" >> $GITHUB_ENV
          fi
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
      - name: Build with Maven
        run: |
          # 本地默认仍跑测试（见 rxlib/pom.xml）；仅在此 CI 部署步骤用命令行覆盖为跳过。
          mvn clean package -pl ${{ env.APP_MODULE }} -am -Dmaven.test.skip=true -DskipTests=true -Dmaven.javadoc.skip=true --no-transfer-progress --batch-mode

          echo "target 目录完整路径: ${PWD}/${{ env.APP_MODULE }}/target"
          echo "=== 文件列表（详细）==="
          ls -la ${PWD}/${{ env.APP_MODULE }}/target/
          echo "=== 仅 JAR 文件 ==="
          ls -la ${PWD}/${{ env.APP_MODULE }}/target/*.jar || echo "未找到任何 JAR 文件"
    
          # 自动查找 target 目录下的 jar 文件名（通常只有一个）
          JAR_FULL_PATH=$(find ${PWD}/${{ env.APP_MODULE }}/target -maxdepth 1 -type f -name "*.jar" \
            ! -name "*-javadoc.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-tests.jar" | head -n1)
          if [[ -z "${JAR_FULL_PATH}" ]]; then
            echo "Error: No main JAR file found"
            exit 1
          fi
          echo "APP_JAR_PATH=${JAR_FULL_PATH}" >> $GITHUB_ENV

      - name: Copy JAR to context root
        run: |
          cp -f ${{ env.APP_JAR_PATH }} ./app.jar.publish
          cp deploy/${{ env.REMOTE_DIR }}/start.sh ./
          cp deploy/${{ env.REMOTE_DIR }}/rollback.sh ./

      # 4. 复制 JAR 到远程服务器
      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: app.jar.publish,start.sh,rollback.sh
          target: /home/${{ env.REMOTE_DIR }}/
          overwrite: true
      - name: Initial Wait for Service Startup
        run: sleep 2s  # 等待 60 秒，支持格式如 60、60s 或 1m

      # 5. 在远程服务器执行命令（示例：备份旧 JAR、停止服务、启动新服务）
      - name: Execute remote commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            run_as_root() {
              if [ "$(id -u)" -eq 0 ]; then
                "$@"
              elif sudo -n true >/dev/null 2>&1; then
                sudo "$@"
              else
                echo "Error: JDK 21 install requires root or passwordless sudo."
                exit 1
              fi
            }

            apt_get_retry() {
              max_attempts=18
              retry_delay=10
              i=1
              while [ "$i" -le "$max_attempts" ]; do
                if run_as_root apt-get "$@"; then
                  return 0
                fi
                if [ "$i" -eq "$max_attempts" ]; then
                  echo "apt-get $* failed after ${max_attempts} attempts"
                  return 1
                fi
                echo "apt-get $* failed, retrying in ${retry_delay}s..."
                sleep "$retry_delay"
                i=$((i + 1))
              done
            }

            java_major_version() {
              if ! command -v java >/dev/null 2>&1; then
                echo 0
                return
              fi
              java -version 2>&1 | awk -F '"' '/version/ {
                split($2, parts, ".")
                if (parts[1] == "1") {
                  print parts[2]
                } else {
                  print parts[1]
                }
                exit
              }'
            }

            install_jdk21() {
              if command -v apt-get >/dev/null 2>&1; then
                apt_get_retry update -qq
                apt_get_retry install -y -qq openjdk-21-jdk-headless
              elif command -v dnf >/dev/null 2>&1; then
                run_as_root dnf --disablerepo=epel --disablerepo='epel-*' install -y java-21-openjdk-headless
              elif command -v yum >/dev/null 2>&1; then
                run_as_root yum --disablerepo=epel --disablerepo='epel-*' install -y java-21-openjdk-headless
              else
                echo "Error: unsupported package manager, please install JDK 21 manually."
                exit 1
              fi
            }

            set_java_alternative() {
              name="$1"
              binary="$2"
              link="/usr/bin/${name}"
              priority=2100
              if command -v update-alternatives >/dev/null 2>&1; then
                run_as_root update-alternatives --set "$name" "$binary" \
                  || { run_as_root update-alternatives --install "$link" "$name" "$binary" "$priority" \
                    && run_as_root update-alternatives --set "$name" "$binary"; } || true
              elif command -v alternatives >/dev/null 2>&1; then
                run_as_root alternatives --set "$name" "$binary" \
                  || { run_as_root alternatives --install "$link" "$name" "$binary" "$priority" \
                    && run_as_root alternatives --set "$name" "$binary"; } || true
              else
                return 1
              fi
            }

            use_jdk21_default() {
              for java21 in \
                /usr/lib/jvm/java-21-openjdk-amd64/bin/java \
                /usr/lib/jvm/java-21-openjdk/bin/java \
                /usr/lib/jvm/java-21*/bin/java; do
                if [ -x "$java21" ]; then
                  JAVA_HOME="$(cd "$(dirname "$java21")/.." && pwd)"
                  export JAVA_HOME
                  export PATH="$(dirname "$java21"):${PATH}"
                  hash -r 2>/dev/null || true
                  set_java_alternative java "$java21" || true
                  javac21="$(dirname "$java21")/javac"
                  if [ -x "$javac21" ]; then
                    set_java_alternative javac "$javac21" || true
                  fi
                  return 0
                fi
              done
              return 1
            }

            JAVA_MAJOR="$(java_major_version)"
            if [ "$JAVA_MAJOR" != "21" ]; then
              echo "JDK 21 is not the active java, current java major version: ${JAVA_MAJOR}."
              if ! use_jdk21_default || [ "$(java_major_version)" != "21" ]; then
                echo "Installing JDK 21..."
                install_jdk21
                use_jdk21_default || true
              fi
            else
              echo "JDK 21 already installed."
            fi

            JAVA_MAJOR="$(java_major_version)"
            if [ "$JAVA_MAJOR" != "21" ]; then
              echo "Error: JDK 21 install check failed, current java major version: ${JAVA_MAJOR}."
              exit 1
            fi
            java -version

            cd /home/${{ env.REMOTE_DIR }}/
            chmod 755 start.sh
            chmod 755 rollback.sh
            export REUSEPORT_MIGRATION_FALLBACK="${{ env.REUSEPORT_MIGRATION_FALLBACK }}"
            echo "=== before publish ==="
            ps -ef | grep "[a]pp.jar" || true
            echo "REUSEPORT_MIGRATION_FALLBACK=${REUSEPORT_MIGRATION_FALLBACK}"
            bash ./start.sh publish "${{ inputs.deploy_mode || 'replace' }}"
            echo "=== after publish ==="
            bash ./start.sh status
            ps -ef | grep "[a]pp.jar" || true
            echo "Deployment completed"

      - name: Initial Wait for Service Startup
        run: sleep 30s  # 等待 60 秒，支持格式如 60、60s 或 1m
      - name: Health Check After Initial Delay
        id: health-check
        continue-on-error: true  # 允许失败后继续执行后续步骤
        run: |
          HOST=$(echo "${{ env.HEALTH_URL }}" | cut -d: -f1)
          PORT=$(echo "${{ env.HEALTH_URL }}" | cut -d: -f2)
          # 若端口未指定，默认使用常见端口（可选，根据实际需求调整或移除）
          if [[ -z "$PORT" ]]; then
            echo "Error: Port not specified in ENDPOINT '$ENDPOINT'."
            echo "healthy=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          MAX_ATTEMPTS=20                     # 最大重试次数
          RETRY_DELAY=10                      # 每次重试间隔（秒）
          TIMEOUT_PER_ATTEMPT=5               # 单次连接超时（秒）
          
          echo "Starting TCP health check for $HOST:$PORT (max $MAX_ATTEMPTS attempts, interval ${RETRY_DELAY}s)..."
          
          for ((i=1; i<=MAX_ATTEMPTS; i++)); do
            if timeout $TIMEOUT_PER_ATTEMPT bash -c "cat < /dev/null > /dev/tcp/$HOST/$PORT" >/dev/null 2>&1; then
              echo "Success: TCP port $HOST:$PORT is reachable after $i attempt(s)."
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            else
              echo "Attempt $i/$MAX_ATTEMPTS: TCP port $HOST:$PORT not reachable. Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done
          
          echo "Failure: TCP port $HOST:$PORT is not reachable after $MAX_ATTEMPTS attempts."
          echo "healthy=false" >> $GITHUB_OUTPUT
          exit 1
      - name: Rollback to latest on Health Check Failure
        if: (steps.health-check.outputs.healthy == 'false' || steps.health-check.outcome == 'failure') && (inputs.deploy_mode == 'replace')
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/${{ env.REMOTE_DIR }}/
            chmod 755 rollback.sh
            ./rollback.sh
            echo "Health check failed. Rolling back to latest tag."
      - name: Keep coexist deployment for manual check on Health Check Failure
        if: (steps.health-check.outputs.healthy == 'false' || steps.health-check.outcome == 'failure') && (inputs.deploy_mode == 'coexist')
        run: |
          echo "Health check failed in coexist mode. Old process is kept; inspect app-a/app-b logs and kill the bad slot manually."
          exit 1
