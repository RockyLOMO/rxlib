name: Agent CI

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this workflow was triggered"
        required: false
        default: "manual agent validation"

  push:
    branches:
      - "agent/**"

  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Build and test
        run: mvn -B -U clean test
